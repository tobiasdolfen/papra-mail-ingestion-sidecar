variables:
  CI_REGISTRY_IMAGE: $CI_REGISTRY/$CI_PROJECT_NAMESPACE/$CI_PROJECT_NAME
  DOCKER_TLS_CERTDIR: ""
  DOCKER_BUILDKIT: "1"

stages:
  - check
  - build
  - merge

lint:
  stage: check
  image: oven/bun:1-alpine
  script:
    - bun install --frozen-lockfile
    - bun run lint

typecheck:
  stage: check
  image: oven/bun:1-alpine
  script:
    - bun install --frozen-lockfile
    - bun run typecheck

.build_template: &build_template
  image: docker:27-dind
  services:
    - name: docker:27-dind
      command: ["--tls=false"]
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker buildx create --use --name mybuilder
    - docker buildx inspect --bootstrap mybuilder
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

build_amd64:
  <<: *build_template
  stage: build
  tags:
    - amd64
  script:
    - >
      docker buildx build
      --platform linux/amd64
      --cache-from type=registry,ref=$CI_REGISTRY_IMAGE:cache-amd64
      --cache-to type=registry,ref=$CI_REGISTRY_IMAGE:cache-amd64,mode=max
      --build-arg BUILDKIT_INLINE_CACHE=1
      --tag $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG-amd64
      --push
      .

build_arm64:
  <<: *build_template
  stage: build
  tags:
    - arm64
  script:
    - >
      docker buildx build
      --platform linux/arm64
      --cache-from type=registry,ref=$CI_REGISTRY_IMAGE:cache-arm64
      --cache-to type=registry,ref=$CI_REGISTRY_IMAGE:cache-arm64,mode=max
      --build-arg BUILDKIT_INLINE_CACHE=1
      --tag $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG-arm64
      --push
      .

merge_manifests:
  <<: *build_template
  stage: merge
  needs: ["build_amd64", "build_arm64"]
  script:
    - >
      docker buildx imagetools create
      -t $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG
      -t $CI_REGISTRY_IMAGE:latest
      $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG-amd64
      $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG-arm64
